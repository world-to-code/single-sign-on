# Production profile: all secrets come from the environment; required secrets have no
# default so the app fails fast if they are missing.
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/sso}
    # Runtime connects as a NON-SUPERUSER role so RLS is enforced (sso.tenancy.require-non-superuser-role=true
    # in application.yml fails startup otherwise). Provision this role out of band (owned by nothing, DML only);
    # Flyway migrates as the owner below. DB_APP_USERNAME defaults to the owner only for a single-role dev-like
    # deploy — in real prod set a distinct non-superuser.
    username: ${DB_APP_USERNAME:${DB_USERNAME:sso}}
    password: ${DB_APP_PASSWORD:${DB_PASSWORD}}
  flyway:
    # Migrations run as the schema owner (keeps DDL); the placeholder names the runtime role V54 grants to.
    # Explicit url (same target as the app datasource): the primary DataSource is the OrgAwareDataSource RLS
    # wrapper, which Flyway cannot derive a migration DataSource from — it needs its own owner connection.
    url: ${DB_URL:jdbc:postgresql://postgres:5432/sso}
    user: ${DB_USERNAME:sso}
    password: ${DB_PASSWORD}
    placeholders:
      approle: ${DB_APP_USERNAME:${DB_USERNAME:sso}}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      # No default: Redis holds serialized SecurityContexts (principal + MFA_COMPLETE), so a passwordless
      # prod Redis is an auth-bypass risk — fail fast like DB_PASSWORD / crypto secrets do.
      password: ${REDIS_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

server:
  port: ${SERVER_PORT:9000}
  # Trust X-Forwarded-* ONLY from the configured trusted proxy CIDR(s) — Tomcat's RemoteIpValve
  # ignores XFF from any other peer, so external clients can't spoof the client IP (which the rate
  # limiter + IP access list rely on). MUST set SSO_TRUSTED_PROXIES to your load-balancer CIDR;
  # the safe default trusts only loopback (so behind an LB the real client IP won't resolve until set).
  forward-headers-strategy: native
  tomcat:
    remoteip:
      internal-proxies: ${SSO_TRUSTED_PROXIES:127\.0\.0\.1}
  servlet:
    session:
      cookie:
        secure: true   # HTTPS-only session cookie in production

sso:
  issuer: ${SSO_ISSUER}
  tenancy:
    # Fail startup if the DB runtime role is a superuser — a superuser bypasses RLS, silently disabling
    # tenant isolation. The runtime role must be a non-superuser (Flyway may migrate as the owner).
    require-non-superuser-role: true
  admin:
    username: ${SSO_ADMIN_USERNAME:admin}
    email: ${SSO_ADMIN_EMAIL:admin@example.com}
    password: ${SSO_ADMIN_PASSWORD}
  saml:
    entity-id: ${SSO_SAML_ENTITY_ID}
    sso-location: ${SSO_SAML_SSO_LOCATION}
    slo-location: ${SSO_SAML_SLO_LOCATION}
    keystore-path: ${SSO_SAML_KEYSTORE_PATH:/data/saml-idp.p12}
    keystore-password: ${SSO_SAML_KEYSTORE_PASSWORD}
  cors:
    allowed-origins: ${SSO_CORS_ORIGINS:http://localhost:5173}
  scim:
    dev-token: ${SSO_SCIM_DEV_TOKEN:}   # blank -> no seeded token; issue via the admin API
  ratelimit:
    attempts: ${SSO_RATELIMIT_ATTEMPTS:10}
    window-seconds: ${SSO_RATELIMIT_WINDOW:60}
  crypto:
    master-password: ${SSO_CRYPTO_MASTER_PASSWORD}
    salt: ${SSO_CRYPTO_SALT}   # no default in prod: fail fast; use a unique per-deployment salt
  demo-client:
    enabled: ${SSO_DEMO_CLIENT_ENABLED:false}   # do not seed the known-secret demo client in prod
  integration-test:
    enabled: ${SSO_INTEGRATION_TEST_ENABLED:false}   # never seed federation test RPs in prod
  admin-console:
    redirect-uris: ${SSO_ADMIN_CONSOLE_REDIRECT_URIS}   # the prod SPA origin + /admin/callback

management:
  # Actuator on a SEPARATE port with NO SecurityFilterChain of its own (the app's chains bind the primary
  # context, not this one), so this port MUST be locked down by a Kubernetes NetworkPolicy that admits ONLY the
  # Prometheus scraper and the kubelet probes — never the ingress. Read-only endpoints only: `loggers` (a POST
  # that flips runtime log levels, which could enable secret/token DEBUG logging) is deliberately NOT exposed.
  # Override the port via MANAGEMENT_SERVER_PORT if the deployment needs it elsewhere.
  server:
    port: ${MANAGEMENT_SERVER_PORT:9001}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  # OTLP trace export: set MANAGEMENT_OTLP_TRACING_ENDPOINT (e.g. http://tempo:4318/v1/traces) once a
  # collector exists; add opentelemetry-exporter-otlp to enable the exporter. Sampling is inherited (1.0).

logging:
  level:
    org.springframework.security: INFO
  # Structured stdout for log aggregation (Loki/ELK): ECS JSON, one object per line, MDC (traceId/spanId,
  # userId, orgId, clientIp) as top-level fields. k8s collects stdout; no file appender.
  structured:
    format:
      console: ecs
