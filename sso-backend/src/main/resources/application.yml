spring:
  application:
    name: mini-sso-system
  lifecycle:
    # Graceful shutdown drain window (see server.shutdown below). On SIGTERM the readiness probe flips to
    # REFUSING_TRAFFIC so Kubernetes stops routing, while in-flight requests finish within this window. Kept
    # UNDER the pod's terminationGracePeriodSeconds (k8s default 30s) so the drain completes before SIGKILL.
    timeout-per-shutdown-phase: 25s
  jackson:
    deserialization:
      # Jackson 3 (Boot 4) rejects null/absent -> primitive by default; allow omitted
      # optional booleans/ints in request DTOs to fall back to their defaults (false/0).
      fail-on-null-for-primitives: false
  datasource:
    url: jdbc:postgresql://localhost:5432/sso
    # Runtime connects as the NON-SUPERUSER role so Row-Level Security is actually enforced (a superuser
    # bypasses RLS even with FORCE). Provisioned by docker/postgres-init; granted DML by migration V54.
    username: sso_app
    password: sso_app
  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        # No @RedisHash repositories exist (Redis is used only for Spring Session). Disabling the scan
        # stops Spring Data Redis from mis-inspecting every JPA repository ("could not identify store").
        enabled: false
  session:
    # Sessions in Redis (see RedisSessionConfig): the key TTL fires SessionExpiredEvent on idle
    # expiry with no request. Mirror the servlet idle timeout; per-policy idle is applied per-request
    # by SessionIntegrityFilter via setMaxInactiveInterval (which now sets the Redis key TTL).
    timeout: 30m
  jpa:
    hibernate:
      ddl-auto: validate        # schema is owned by Flyway, never by Hibernate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        # Batch EAGER/lazy association loads into IN(...) queries instead of one-per-parent (N+1).
        # Applies globally to @ManyToMany / @OneToMany / @ElementCollection collection initialization.
        default_batch_fetch_size: 100
        connection:
          # Load-bearing for tenant RLS (see OrgAwareDataSource): the connection is acquired lazily on the
          # first statement — after a service enters OrgContext.runInOrg(...) — and held for the whole tx, so
          # the per-connection app.current_org GUC reflects the operation's tenant. Do NOT switch to a
          # RELEASE_AFTER_STATEMENT mode.
          handling_mode: DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Migrations run as the schema OWNER (keeps full DDL); the runtime datasource above is a non-superuser.
    # An explicit url is required: the app's primary DataSource is the OrgAwareDataSource RLS wrapper, which
    # Flyway cannot derive a migration DataSource from (no url setter) — so give it its own owner connection.
    url: jdbc:postgresql://localhost:5432/sso
    user: sso
    password: sso
    placeholders:
      approle: sso_app     # V54 grants this runtime role its DML (parameterized so prod can rename it)
  mail:
    host: localhost
    port: 1025                  # MailHog (docker-compose) for OTT email in dev
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

server:
  port: 9000                    # conventional auth-server port
  # Zero-downtime rolling deploys: on SIGTERM stop accepting new connections and let in-flight requests
  # (login/OIDC/SAML flows) finish rather than cutting them mid-flight. Paired with the readiness probe, which
  # Boot flips to REFUSING_TRAFFIC on shutdown so k8s drains the pod from its endpoints first.
  shutdown: graceful
  # DEV runs without a proxy, so DO NOT trust X-Forwarded-* — the security decisions (per-IP rate
  # limiter, IP access list) must use the real peer address, not a client-spoofable header.
  # In prod (application-prod.yml) this is 'native' with a pinned trusted-proxy CIDR.
  forward-headers-strategy: none
  error:
    # Never leak internals in an error body: a stack trace / exception class / bound-field detail can
    # expose PII and internal structure. Any error that reaches Boot's default page (e.g. a filter-level
    # 403, or an unhandled 5xx) stays non-revealing; handled 4xx return an RFC-7807 ProblemDetail instead.
    include-stacktrace: never
    include-message: never
    include-exception: false
    include-binding-errors: never
  servlet:
    session:
      timeout: 30m              # Zero-Trust: short idle session lifetime
      cookie:
        http-only: true
        same-site: lax
        secure: false           # dev (HTTP); set true (HTTPS-only cookies) in production

sso:
  issuer: http://localhost:9000  # OIDC issuer + SAML IdP entityID base (bare/platform host)
  # Deployment plane. all = the single all-in-one server (default). auth = a public auth-runtime
  # deployment that does NOT serve the management surface (/api/admin/**, /admin console) — for
  # blast-radius + scale isolation of the login/OIDC/SAML plane. admin = reserved (currently == all).
  plane: all
  tenancy:
    # Fail startup if the runtime DB role is a superuser (which silently bypasses RLS). The runtime
    # datasource above is the non-superuser `sso_app`, so this holds in dev/test and must hold in prod.
    require-non-superuser-role: true
  tenant:
    # Base domains under which a tenant subdomain identifies the org, e.g. acme.localhost / acme.idp.example.com.
    # A bare base domain keeps the slug-typed tenant-first login. Local dev: *.localhost → 127.0.0.1 (no DNS).
    base-domains: localhost,idp.example.com
  admin:
    username: admin
    email: admin@example.com
    password: admin123!          # dev only — override via SSO_ADMIN_PASSWORD in real deployments
  saml:
    entity-id: http://localhost:9000/saml2/idp
    sso-location: http://localhost:9000/saml2/idp/sso
    slo-location: http://localhost:9000/saml2/idp/slo   # SAML Single Logout endpoint (advertised in metadata)
    keystore-path: data/saml-idp.p12
    keystore-password: changeit  # dev only
    key-size: 2048                       # self-signed IdP signing key size (bits)
    certificate-validity-days: 3650      # self-signed IdP certificate lifetime
    assertion-validity-seconds: 300      # SAML assertion/response validity window (SP clock-skew tolerance)
  scim:
    max-results: 50                      # max results per SCIM list/filter response
    max-filter-depth: 5                  # max nesting depth of a SCIM filter expression
    max-bulk-operations: 10              # max operations in a single SCIM bulk request
  totp:
    qr-size: 220                         # enrollment QR code size (px)
  ratelimit:
    attempts: 10
    window-seconds: 60
  lockout:
    max-attempts: 5             # Zero-Trust: lock an account after repeated failed logins
    duration-minutes: 15        # first lock; each further lockout doubles it
    max-duration-minutes: 480   # ceiling, so an account is never locked out forever
  zerotrust:
    bind-client: true                       # bind a session to the client it was established on
    session-absolute-lifetime-minutes: 480  # force full re-authentication after 8h regardless of activity
    stepup-challenge-validity-minutes: 15   # after this, an abandoned step-up challenge is ignored as stale
    # Revocation propagation must not fail SILENTLY: when an access change (disable/lock/role-revoke) terminates a
    # user's sessions, a fast in-thread retry clears a momentary store blip; if that is exhausted (or a crash
    # interrupts it), the termination is handed to the DURABLE sweep below — persisted in Redis and re-driven
    # across restarts until delivered or the give-up cap — so a session is re-driven, not merely observed.
    termination-retry:
      initial-backoff: PT0.05S              # 50ms — a transient store blip clears fast
      multiplier: 2.0                       # exponential growth per attempt
      randomization-factor: 0.5             # jitter band (±50%)
      max-attempts: 4                       # then hand off to the durable sweep (audited SESSION_TERMINATION_DEFERRED)
      # Durable backstop: a termination the in-thread retry could not complete is kept in Redis and re-driven by a
      # scheduled sweep until it succeeds or the give-up cap, surviving long store outages and process restarts so
      # a revocation is never silently lost. Give-up is audited SESSION_TERMINATION_FAILED (bounded + observable).
      durable:
        initial-backoff: PT10S              # first durable re-drive ~10s after hand-off
        multiplier: 2.0                     # exponential growth per attempt
        randomization-factor: 0.5           # jitter band (±50%) so a fleet does not thundering-herd a store recovery
        max-attempts: 8                     # ~30min total, then audit SESSION_TERMINATION_FAILED and abandon
        registry-ttl: PT2H                  # must exceed the give-up horizon (a startup guard enforces this)
        sweep-interval: PT30S               # @Scheduled fixedDelay — how often a node tries to drive the sweep
        lock-ttl: PT25S                     # SET NX PX single-driver lock; < sweep-interval, > worst-case batch
        processing-lease: PT2M              # visibility timeout: a claimed entry re-surfaces if the driver dies
        sweep-batch-size: 200               # max entries re-driven per tick (bounds lock-hold time)
  logout:
    # Dedicated bounded pool for OIDC back-channel + SAML SLO fan-out, kept OFF the shared @Async pool so a
    # slow relying party can never starve tenant onboarding/provisioning (and vice versa). A full queue
    # degrades to running the send on the caller (Redis event-listener) thread — best-effort, never dropped.
    propagation:
      executor:
        core-pool-size: 4
        max-pool-size: 8
        queue-capacity: 500
      # Durable retry: a participant whose back-channel delivery failed transiently is kept in the session
      # index and re-driven by a scheduled sweep until delivered or the give-up cap. Survives RP downtime and
      # process restarts (state is in Redis), so a logout is never silently lost.
      retry:
        sweep-interval: PT30S        # @Scheduled fixedDelay — how often a node tries to drive the sweep
        lock-ttl: PT25S              # SET NX PX single-driver lock; < sweep-interval, > worst-case pick+dispatch
        processing-lease: PT2M       # visibility timeout: a claimed sid re-appears if the driver crashes mid-redrive
        initial-backoff: PT30S       # first retry delay (exponential base)
        multiplier: 2.0              # exponential growth per attempt
        randomization-factor: 0.5    # jitter band (±50%)
        max-attempts: 10             # give-up cap; ~8-12h horizon, well under the P8D index TTL
        registry-ttl: P8D            # retry ZSET/meta TTL — aligned with the session-index TTLs
        sweep-batch-size: 100        # max due sids re-driven per queue per tick
  mapping:
    # Metadata-driven auto-mapping re-evaluation runs off the request thread on a dedicated bounded pool, with a
    # short in-thread retry for transient lock contention and a scheduled full-reconcile sweep as the durability
    # net (an AFTER_COMMIT @Async event is fire-and-forget, so a crash between commit and reconcile would else lose it).
    reconcile:
      executor:
        core-pool-size: 4
        max-pool-size: 8
        queue-capacity: 500
      retry:                          # in-thread retry for TRANSIENT lock contention only (deadlock/lock-timeout)
        initial-backoff: PT0.05S      # 50ms — lock contention clears in millis; keep the pool thread free fast
        multiplier: 2.0               # exponential growth per attempt
        randomization-factor: 0.5     # jitter band (±50%) so re-driving nodes don't thundering-herd a hot rule
        max-attempts: 4               # small cap; the sweep is the durable net for anything that outlives this
      sweep:
        interval: PT10M               # @Scheduled fixedDelay — durability backstop that re-drives lost reconciles, not the primary path
        lock-ttl: PT8M                # SET NX PX single-driver lock; < interval so a crashed driver's next tick re-acquires
  crypto:
    master-password: dev-master-password-change-me  # dev only — override in prod
    salt: 5c0744940b5c369b
    rsa-key-size: 2048                               # OIDC signing key size (bits)
    jwks-retained-inactive-keys: 1                   # rotated-away keys kept in the JWKS (default; per-org override via admin API)
    jwks-max-retained-inactive-keys: 10              # ceiling for the per-org retention setting (bounds JWKS growth)
  email-otp:
    ttl-minutes: 10                                  # email one-time-code validity
    max-attempts: 5                                  # wrong guesses before the code is burned
  onboarding:
    min-password-length: 8                           # minimum length an invitee's chosen password must meet
    invitation-ttl: 72h                              # how long a set-password invitation stays redeemable
    verification-ttl: 72h                                  # how long a self-service email-verification link stays redeemable
    resend-cooldown: 1m                                    # min interval between verification emails to the same address (anti-bomb)
    # Dev links point at the SPA origin (Vite :5173), where the /set-password + /activate client-side routes and
    # the host-bound session live — NOT the API-only backend :9000 (which has no SPA route). Prod overrides these
    # via env to the public edge origin.
    set-password-url: http://{slug}.localhost:5173/set-password  # admin-onboarding invitation — the org is provisioned UP FRONT, so its subdomain already resolves ({slug} substituted)
    activate-url: http://localhost:5173/activate                 # self-service verification — lands on the PLATFORM host: the tenant subdomain does NOT exist until activation creates the org, so a {slug} link would 404. The SPA redirects to {slug}.host AFTER activation.
    workspace-url-template: http://{slug}.localhost:5173   # tenant workspace address emailed to the new admin ({slug} substituted)
  demo-client:
    enabled: true                                    # local-testing OIDC client (known secret); false in prod
    access-token-ttl-minutes: 30
    refresh-token-ttl-days: 7
  integration-test:
    enabled: true                                    # seed oauth2-proxy (OIDC) + SimpleSAMLphp (SAML) test RPs; false in prod
  admin-console:
    # first-party OIDC client for the admin console; redirect URIs = the SPA origin(s) + /admin/callback
    redirect-uris: http://localhost:9000/admin/callback,http://127.0.0.1:9000/admin/callback,http://localhost:5173/admin/callback
    # The shared client's token lifetime is the CEILING (24h = the per-tenant max); AdminElevationFilter
    # enforces the real per-tenant elevation TTL from admin_portal_settings by the token's age.
    access-token-ttl-minutes: 1440
    refresh-token-ttl-minutes: 30
    # Elevation freshness + admin session idle/absolute lifetimes are now runtime-editable in the
    # admin console (Applications -> Admin Portal -> Portal settings), stored in policy_binding.
    # Fallback elevation TTL for a fresh install before the global admin_console_config row exists.
    default-elevation-ttl-minutes: 5
    # Platform ceiling on a tenant's console elevation TTL (zero-trust: privilege is time-boxed). A tenant
    # cannot set its console elevation above this, so one step-up can never keep the console open indefinitely.
    max-elevation-ttl-minutes: 240
  metrics:
    trend-days: 30   # analytics window for the dashboards' sign-in trend + platform totals

management:
  # The PUBLIC port (:9000) exposes only health + info. Metrics/prometheus/loggers are exposed ONLY on the
  # separate management port in prod (application-prod.yml), so internal telemetry never reaches the ingress.
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true            # /actuator/health/{liveness,readiness} — Kubernetes liveness/readiness probes
  tracing:
    sampling:
      probability: 1.0           # trace EVERY request. No OTLP exporter is wired yet, so this only governs
                                 # export once a collector is attached (management.otlp.tracing.endpoint) — the
                                 # traceId/spanId reach the logs regardless. Lower it under heavy export load.

logging:
  level:
    org.springframework.security: INFO
    # OpenSAML probes every XML-security algorithm at startup and logs INFO for ones the JRE's
    # JCE doesn't provide (e.g. RIPEMD160, which we don't use). Quiet that benign noise.
    org.opensaml.xmlsec.algorithm.AlgorithmRegistry: WARN
    # Per-request access log + error flow (see RequestLoggingFilter / GlobalExceptionHandler).
    com.example.sso: INFO
  # Micrometer Tracing auto-adds "[app,traceId,spanId]" to the console pattern; kept explicit so the dev
  # console always shows the correlation id even if the auto-config default changes.
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
