services:
  postgres:
    image: postgres:17
    container_name: sso-postgres
    environment:
      POSTGRES_DB: sso
      POSTGRES_USER: sso
      POSTGRES_PASSWORD: sso
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sso -d sso"]
      interval: 5s
      timeout: 3s
      retries: 10

  # SMTP sink for testing one-time-token (OTT) MFA emails. UI at http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: sso-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
