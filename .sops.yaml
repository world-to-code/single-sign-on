# SOPS (github.com/getsops/sops) rules for this repo's secrets.
#
# Secrets live ENCRYPTED at secrets/<env>.sops.yaml. Only the recipients listed below can decrypt them, so the
# ciphertext is safe to commit; CI (.github/workflows/security.yml, the `sops` job) FAILS the build if any
# secrets/*.yaml other than *.example.yaml is committed without encryption.
#
# See docs/sops.md for the operator runbook (key generation, onboarding, rotation, disaster recovery).
#
# ---------------------------------------------------------------------------------------------------------
# RECIPIENTS — read this before adding one.
#
# Every recipient can decrypt EVERY value in the matching files. Adding one grants full production access;
# removing one does NOT revoke what they already read, so a departure means rotating the secrets themselves,
# not just this list.
#
# List MORE THAN ONE. A single recipient means one lost laptop makes every production secret unrecoverable —
# `sops` cannot decrypt without a private key, and there is no escrow. Two operator keys is the minimum; a
# cloud KMS key (`kms:`/`gcp_kms:`/`azure_kv:`) alongside them is better, because it survives people.
#
# Onboarding is: the new operator runs `age-keygen`, sends you their PUBLIC key (age1...), you add it here and
# run `scripts/sops-rekey.sh`. Their private key never leaves their machine and never enters this repo.
# ---------------------------------------------------------------------------------------------------------

creation_rules:
  # Production. Keep its recipient set separate from every other environment: a staging key must not open
  # production, or staging access silently becomes production access.
  - path_regex: secrets/prod\.sops\.ya?ml$
    encrypted_regex: &secret_keys "^(.*_PASSWORD|.*_SECRET|.*_SALT|.*_TOKEN|.*_KEY|.*_KEYSTORE_.*|.*_CREDENTIALS|.*_PRIVATE_.*)$"
    # Encrypt the values, not the keys: a git diff still shows WHICH setting changed, which is most of the
    # review value, while the value itself stays opaque.
    age: >-
      age1REPLACE_WITH_OPERATOR_ONE_PUBLIC_KEY,
      age1REPLACE_WITH_OPERATOR_TWO_PUBLIC_KEY

  # Every other environment (staging, demo, …). Same rules, its own recipients.
  - path_regex: secrets/.*\.sops\.ya?ml$
    encrypted_regex: *secret_keys
    age: >-
      age1REPLACE_WITH_OPERATOR_ONE_PUBLIC_KEY,
      age1REPLACE_WITH_OPERATOR_TWO_PUBLIC_KEY
