# Template for secrets/prod.sops.yaml. Copy it, fill in REAL values, then encrypt:
#   cp secrets/prod.example.yaml secrets/prod.sops.yaml && sops --encrypt --in-place secrets/prod.sops.yaml
#
# NEVER commit secrets/prod.sops.yaml unencrypted — CI (the `secrets` job) fails if it is not SOPS-encrypted.
# These values feed docker-compose.prod.yml (via `sops exec-env`) and a future k8s Secret; each is a plaintext
# PLACEHOLDER here so this template carries no real secret.
DB_PASSWORD: replace-me
DB_APP_PASSWORD: replace-me
REDIS_PASSWORD: replace-me
SSO_ADMIN_PASSWORD: replace-me
SSO_SAML_KEYSTORE_PASSWORD: replace-me
SSO_CRYPTO_MASTER_PASSWORD: replace-me
SSO_CRYPTO_SALT: "00000000000000000000000000000000"   # HEX only (Spring's Encryptors.delux hex-decodes it)
