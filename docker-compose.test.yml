# Federation test clients for the IdP running on the host at http://localhost:9000.
#
#   OIDC : oauth2-proxy  — a real OIDC Relying Party. Browse http://localhost:4180 -> it sends
#                          you to the IdP, and after login lands back authenticated.
#   SAML : SimpleSAMLphp — a real SAML Service Provider. Browse http://localhost:8088/simplesaml
#                          -> "Test configured authentication sources" -> default-sp -> IdP login.
#
# The IdP itself is NOT in this file (run it on the host: `cd sso-backend && ./gradlew bootRun`,
# which seeds the matching OIDC client + SAML relying party when sso.integration-test.enabled=true).
#
# SAML needs the IdP's signing certificate first:  python3 scripts/setup_saml_test.py  (writes .env)
# Then:  docker compose -f docker-compose.test.yml up
name: sso-test   # isolated compose project so up/down never touches the main infra (postgres/mailhog)
services:
  # --- OIDC Relying Party -----------------------------------------------------------------
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: sso-oauth2-proxy
    # host networking so the container reaches the IdP at the SAME localhost:9000 URL the browser
    # uses (oauth2-proxy requires the discovered issuer to match its configured issuer URL).
    network_mode: host
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://localhost:9000
      OAUTH2_PROXY_CLIENT_ID: oauth2-proxy
      OAUTH2_PROXY_CLIENT_SECRET: oauth2-proxy-secret
      OAUTH2_PROXY_REDIRECT_URL: http://localhost:4180/oauth2/callback
      OAUTH2_PROXY_SCOPE: openid profile email
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_UPSTREAMS: static://200            # show a 200 page once authenticated
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"       # go straight to the IdP
      OAUTH2_PROXY_COOKIE_SECURE: "false"             # dev is HTTP
      OAUTH2_PROXY_COOKIE_SECRET: "0123456789abcdef0123456789abcdef"  # 32 bytes (dev only)
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
      OAUTH2_PROXY_OIDC_EMAIL_CLAIM: email
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"           # expose X-Auth-Request-* (claims) on the upstream

  # --- SAML Service Provider --------------------------------------------------------------
  simplesamlphp:
    image: kenchan0130/simplesamlphp:latest
    container_name: sso-simplesamlphp
    ports:
      - "8088:8080"
    environment:
      SIMPLESAMLPHP_SP_ENTITY_ID: urn:test:simplesamlphp
      SIMPLESAMLPHP_SP_NAME_ID_FORMAT: urn:oasis:names:tc:SAML:1.1:nameid-format:emailAddress
      SIMPLESAMLPHP_IDP_ENTITY_ID: http://localhost:9000/saml2/idp
      SIMPLESAMLPHP_IDP_SSO_URL: http://localhost:9000/saml2/idp/sso
      # The IdP's SAML signing certificate (base64 body) — populated into .env by setup_saml_test.py.
      SIMPLESAMLPHP_IDP_CERTIFICATE: ${SSO_SAML_IDP_CERT:-}
      SIMPLESAMLPHP_ADMIN_PASSWORD: admin
      SIMPLESAMLPHP_SECRET_SALT: dev-test-salt
