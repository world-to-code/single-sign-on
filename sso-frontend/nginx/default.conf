# The edge server: serve the SPA static bundle and reverse-proxy the backend's API/protocol paths, so the
# browser only ever sees ONE origin (the same-origin session cookie + CSRF + host-derived OIDC/SAML issuer
# are all preserved). The proxied path set mirrors the vite dev proxy (sso-frontend/vite.config.ts) EXACTLY,
# minus /actuator — management is not exposed to the browser — so dev and prod route identically.
#
# TLS is terminated AT (or in front of) this edge in production; the local compose runs plain HTTP on :8080.

# Derive the PUBLIC port from the browser's Host header: the edge listens on :80 inside the container but is
# published on another port (e.g. :8080), and that public port lives only in the Host header. Forwarding it as
# X-Forwarded-Port is what makes the backend's host-derived OIDC/SAML issuer carry the right port (without it,
# Tomcat defaults to the scheme port and drops :8080 from the issuer). Falls back to the scheme default when the
# Host carries no explicit port (e.g. TLS on :443).
map $scheme $default_port {
    default 80;
    https   443;
}
map $http_host $fwd_port {
    default           $default_port;
    "~:(?<p>[0-9]+)$" $p;
}
# HSTS is meaningful only over HTTPS, so gate it on the scheme (an empty value makes nginx omit the header).
# includeSubDomains covers every tenant subdomain; two-year max-age is the common production floor.
map $scheme $hsts_value {
    https   "max-age=63072000; includeSubDomains";
    default "";
}

upstream backend {
    server backend:9000;
}

server {
    listen 80;
    server_name _;
    server_tokens off;   # do not advertise the nginx version

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Production security headers for the WHOLE origin (single source of truth). Every location below inherits
    # these because none declares its own add_header — caching uses `expires`, which does not break add_header
    # inheritance. Applied with `always` so they cover error responses too.
    add_header Strict-Transport-Security $hsts_value always;   # HTTPS only (empty -> header omitted on plain HTTP)
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;        # the IdP is never legitimately framed
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Proxy defaults, inherited by every proxied location below. Pass the FULL original authority via $http_host
    # (host:port, e.g. acme.localhost:8080) + X-Forwarded-* so the backend (forward-headers-strategy=native)
    # derives the PER-TENANT subdomain org AND the correct OIDC/SAML issuer + WebAuthn origin from the public host.
    proxy_http_version 1.1;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $fwd_port;
    # The backend (Spring Security) also emits these; strip its copies so the edge's are the single source.
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header Strict-Transport-Security;

    # --- Backend reverse proxy (longest-prefix wins over the SPA "/" below) ---
    location /api/             { proxy_pass http://backend; }
    location /oauth2/          { proxy_pass http://backend; }
    location /saml2/           { proxy_pass http://backend; }
    location /scim/            { proxy_pass http://backend; }
    location /userinfo         { proxy_pass http://backend; }
    location /.well-known/     { proxy_pass http://backend; }
    location /connect/         { proxy_pass http://backend; }
    location /webauthn/        { proxy_pass http://backend; }
    location = /login/webauthn { proxy_pass http://backend; }

    # --- SPA static bundle with history-mode fallback ---
    # Hashed asset filenames -> long cache; the shell references the current hashes, so it must never go stale.
    location /assets/       { expires 1y; try_files $uri =404; }
    location = /index.html  { expires -1; }
    # Any other path is a client-side route: serve the shell and let the SPA router take over.
    location / { try_files $uri $uri/ /index.html; }
}
