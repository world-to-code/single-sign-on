name: CI

# Orchestrator: fans out to one reusable workflow per role (each in its own file). Continuous INTEGRATION
# only — no registry push (CI, not CD). Within backend/frontend the image is built only after its tests pass.
on:
  push:
    branches: [main]
  pull_request:

# Least privilege for every called workflow (a reusable workflow can't exceed the caller's grants).
permissions:
  contents: read

# One in-flight run per ref; a new push cancels the previous.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    uses: ./.github/workflows/backend.yml
  frontend:
    name: Frontend
    uses: ./.github/workflows/frontend.yml
  config:
    name: Config
    uses: ./.github/workflows/config.yml
  security:
    name: Security
    uses: ./.github/workflows/security.yml
  hygiene:
    name: Hygiene
    uses: ./.github/workflows/hygiene.yml
