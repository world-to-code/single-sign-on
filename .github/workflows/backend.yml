name: Backend

# Reusable: backend test gate + image build. The image is built only AFTER the tests pass (needs:) — a
# container is never produced from unverified code. Called by ci.yml.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      # Real Postgres + Redis; the ubuntu runner provides the Docker daemon they need — which is exactly why
      # tests run HERE, in CI, and not inside the image build. ModularityTests run too.
      #
      # The shared compose stack, same as local development. Running this on the Testcontainers path instead
      # was measured and reverted: each fork starts its own Postgres, and that Postgres is disk-backed with
      # fsync on where the compose one is tmpfs with fsync off, so the suite took roughly twice as long and
      # the added per-fork footprint pushed the 384m test heap into OutOfMemoryError inside Mockito's inline
      # mock maker. The fallback is covered by its own job below, at a size that cannot do either.
      - name: ./gradlew test
        working-directory: sso-backend
        run: ./gradlew --no-daemon test
      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: sso-backend/build/reports/tests/test
          if-no-files-found: ignore

  # TestInfrastructure has a second way to get Postgres and Redis: when the compose stack is unreachable, each
  # JVM starts its own containers. That branch is what a developer hits when the stack is down and what an
  # environment without docker compose relies on, and nothing ran it — an untested fallback rots quietly and
  # is discovered on the day it is needed. A few integration classes are enough to prove it boots, migrates
  # and connects; running the WHOLE suite this way is what previously doubled the time and exhausted the heap.
  fallback:
    name: Testcontainers fallback
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - name: ./gradlew test -PskipTestInfra (a slice)
        working-directory: sso-backend
        run: |
          ./gradlew --no-daemon test -PskipTestInfra -PtestForks=1 \
            --tests 'com.example.sso.user.UserGroupMemberOpsIT' \
            --tests 'com.example.sso.organization.OrganizationRlsIT'

  image:
    name: Image build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: sso-backend
          push: false
          tags: mini-sso-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
