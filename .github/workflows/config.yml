name: Config

# Reusable: validate the prod compose file and the nginx edge config parse/are valid. Called by ci.yml.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    name: Compose + nginx
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: docker compose config
        # The prod compose REQUIRES its secrets (${VAR:?}); pass dummy values just to let the parser resolve.
        env:
          DB_PASSWORD: x
          DB_APP_PASSWORD: x
          REDIS_PASSWORD: x
          SSO_ADMIN_PASSWORD: x
          SSO_SAML_KEYSTORE_PASSWORD: x
          SSO_CRYPTO_MASTER_PASSWORD: x
          SSO_CRYPTO_SALT: '00'
        run: docker compose -f docker-compose.prod.yml config -q
      - name: nginx -t (edge config)
        run: |
          # nginx -t resolves upstream names, so swap the compose service name for a resolvable stand-in.
          sed 's|server backend:9000;|server 127.0.0.1:9000;|' sso-frontend/nginx/default.conf > /tmp/edge.conf
          docker run --rm -v /tmp/edge.conf:/etc/nginx/conf.d/default.conf:ro nginx:1.27-alpine nginx -t
