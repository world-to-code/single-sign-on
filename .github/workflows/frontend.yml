name: Frontend

# Reusable: frontend unit tests + type-check + bundle, then the nginx-edge image (built only after those pass).
# Called by ci.yml.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Test + type-check + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: sso-frontend/package-lock.json
      # Pin npm to the major the lock file was generated with. npm 10 and 11 resolve optional transitive
      # dependencies differently, so a lock written by one makes `npm ci` fail under the other — which is
      # exactly what happened here, twice, with @napi-rs/wasm-runtime's @emnapi packages.
      - name: pin npm
        run: npm i -g npm@11
      - name: npm ci
        working-directory: sso-frontend
        run: npm ci
      - name: vitest
        working-directory: sso-frontend
        run: npm test

      - name: tsc + vite build
        working-directory: sso-frontend
        run: npm run build

  image:
    name: Edge image build
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: sso-frontend
          push: false
          tags: mini-sso-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
